# fly.toml app configuration file generated for crowd-lunch on 2025-07-03T23:49:09Z
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "crowd-lunch"
primary_region = "nrt"

[build]
  dockerfile = "api/Dockerfile"

[env]
  PORT = "8000"
  PYTHONPATH = "/app"
  # 本番DBは Supabase Postgres（DATABASE_URL は fly secret で上書き）。
  # 下記 sqlite はシークレット未設定時のフォールバック（ロールバック用に当面残す）。
  DATABASE_URL = "sqlite:////data/crowdlunch.db"

# 旧SQLite用の永続ボリューム。Postgres移行のロールバック保険として当面マウント維持。
[mounts]
  source = "crowd_lunch_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[deploy]
  strategy = "rolling"
  # デプロイ時にDBマイグレーションを自動適用（env.pyがDATABASE_URL=Postgresを使用）
  release_command = "alembic upgrade head"
