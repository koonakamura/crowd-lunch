# Staging 用 fly 設定（本番 fly.toml と分離）。DBは別Supabaseプロジェクト。
app = "crowd-lunch-staging"
primary_region = "nrt"

[build]
  dockerfile = "api/Dockerfile"

[env]
  PORT = "8000"
  PYTHONPATH = "/app"
  # DATABASE_URL は fly secret（staging用Supabase）で設定する。

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[deploy]
  strategy = "immediate"
  release_command = "alembic upgrade head"
